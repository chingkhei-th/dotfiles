# Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'

# Inserts a blank line between shell prompts
add_newline = false
format = """
$os\
$username\
$directory\
$git_branch\
$git_status\
$fill\
$python\
$conda\
$lua\
$nodejs\
$aws\
$docker_context\
$jobs\
$cmd_duration\
$line_break\
$character\
"""

palette = "onedark"

command_timeout = 1000

# right_format = """"""

# A continuation prompt that displays two filled-in arrows
continuation_prompt = 'ÔûÂÔûÂ '

# ---

[os]
format = '[$symbol](#9e92ed) '
disabled = false

# battery ---
[battery]
format = '[$symbol$percentage]($style) '
disabled = false

[[battery.display]] # 'bold red' style and discharging_symbol when capacity is between 0% and 40%
threshold = 40
style = 'bold red'

[[battery.display]] # 'bold yellow' style  when capacity is between 100% and 40%
threshold = 100
style = 'bold green'


# ---

[character]
success_symbol = "[ÔØ»](bold green)"
error_symbol = "[ÔØ»](bold red)"

# ---

# Shows the username
[username]
style_user = 'bold fg:#f99463'
style_root = 'bold fg:#71C9CE'
format = '[$user]($style) '
disabled = true
show_always = false

# Shows the hostname
[hostname]
ssh_only = false
format = 'on [$hostname](#A6E3E9) '
disabled = true

# Shows current directory
[directory]
style = 'bold fg:#cba6f7'
truncation_length = 3
truncation_symbol = 'ÔÇĞ/'
home_symbol = '¾░ï£ ~'
read_only_style = '197'
read_only = ' ´Çú '
format = '[$path]($style)[$read_only]($read_only_style) '
truncate_to_repo = false

[directory.substitutions]
'Documents' = '¾░êÖ'
'Downloads' = '´ÇÖ '
'Music' = '´Çü '
'Pictures' = '´Ç¥ '

# Shows current git branch
[git_branch]
symbol = '´çÆ ´Éİ '
format = '[$symbol$branch]($style)'
# truncation_length = 4
truncation_symbol = 'ÔÇĞ/'
style = 'green'

# Shows current git status
[git_status]
format = '([ \( $all_status$ahead_behind\)]($style) )'
style = 'green'
conflicted = '[´ü¬ conflicted=${count}](red) '
up_to_date = '[¾░İ¢ up-to-date](green) '
untracked = '[¾░ïù untracked=${count}](red) '
ahead = '´é¬ ahead=${count}'
diverged = '´é¬ ahead=${ahead_count} ´é½ behind=${behind_count}'
behind = '´é½ behind=${count}'
stashed = '[´èï stashed=${count}](green) '
modified = '[¾░ø┐ modified=${count}](yellow) '
staged = '[¾░Éù staged=${count}](green) '
renamed = '[¾▒ı© renamed=${count}](yellow) '
deleted = '[¾░ıÂ deleted=${count}](red) '

[fill]
symbol = ' '

# Shows kubernetes context and namespace
[kubernetes]
format = 'via [¾▒â¥ $context\($namespace\)](bold purple) '
disabled = false

# ---

[time]
disabled = false
time_format = "%r" # Hour:Minute Format
style = "bg:#1d2230"
format = '[[ ´É║ $time ](fg:#a0a9cb bg:#1d2230)]($style)'
use_12hr = true

# ---
[aws]
symbol = "| ´ë░ "
style = 'yellow'
format = '[$symbol($profile )(\[$duration\] )]($style)'

