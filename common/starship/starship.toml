# Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'

# Inserts a blank line between shell prompts
add_newline = false
format = """
$os\
$username\
$directory\
$git_branch\
$git_status\
$fill\
$python\
$conda\
$lua\
$nodejs\
$aws\
$docker_context\
$jobs\
$cmd_duration\
$line_break\
$character\
"""

palette = "onedark"

command_timeout = 1000

# right_format = """"""

# A continuation prompt that displays two filled-in arrows
continuation_prompt = 'Ō¢ČŌ¢Č '

# ---

[os]
format = '[$symbol](#9e92ed) '
disabled = false

# battery ---
[battery]
format = '[$symbol$percentage]($style) '
disabled = false

[[battery.display]] # 'bold red' style and discharging_symbol when capacity is between 0% and 40%
threshold = 40
style = 'bold red'

[[battery.display]] # 'bold yellow' style  when capacity is between 100% and 40%
threshold = 100
style = 'bold green'


# ---

[character]
success_symbol = "[ŌØ»](bold green)"
error_symbol = "[ŌØ»](bold red)"

# ---

# Shows the username
[username]
style_user = 'bold #FED2E2'
style_root = 'white bold'
format = '[$user]($style) '
disabled = true
show_always = false

# Shows the hostname
[hostname]
ssh_only = true
format = 'on [$hostname](#8177d7) '
disabled = true

# Shows current directory
[directory]
style = 'bold fg:#cba6f7'
truncation_length = 3
truncation_symbol = 'ŌĆ”/'
home_symbol = '¾░ŗ£ ~'
read_only_style = '197'
read_only = ' ’ĆŻ '
format = '[$path]($style)[$read_only]($read_only_style) '
truncate_to_repo = false

[directory.substitutions]
'Documents' = '¾░łÖ'
'Downloads' = '’ĆÖ '
'Music' = '’Ćü '
'Pictures' = '’ĆŠ '

# Shows current git branch
[git_branch]
symbol = '’ćÆ ’Éś '
format = '[$symbol$branch]($style)'
# truncation_length = 4
truncation_symbol = 'ŌĆ”/'
style = 'green'

# Shows current git status
[git_status]
format = '([ \( $all_status$ahead_behind\)]($style) )'
style = 'green'
conflicted = '[’ü¬ conflicted=${count}](red) '
up_to_date = '[¾░śĮ up-to-date](green) '
untracked = '[¾░ŗŚ untracked=${count}](red) '
ahead = '’é¬ ahead=${count}'
diverged = '’é¬ ahead=${ahead_count} ’é½ behind=${behind_count}'
behind = '’é½ behind=${count}'
stashed = '[’Ŗŗ stashed=${count}](green) '
modified = '[¾░ø┐ modified=${count}](yellow) '
staged = '[¾░ÉŚ staged=${count}](green) '
renamed = '[¾▒ŹĖ renamed=${count}](yellow) '
deleted = '[¾░ŹČ deleted=${count}](red) '

[fill]
symbol = ' '

# Shows kubernetes context and namespace
[kubernetes]
format = 'via [¾▒āŠ $context\($namespace\)](bold purple) '
disabled = false

# ---

[time]
disabled = false
time_format = "%r" # Hour:Minute Format
style = "bg:#1d2230"
format = '[[ ’É║ $time ](fg:#a0a9cb bg:#1d2230)]($style)'
use_12hr = true

# ---
[aws]
symbol = "| ’ē░ "
style = 'yellow'
format = '[$symbol($profile )(\[$duration\] )]($style)'

[buf]
symbol = "’ÆØ "

[c]
